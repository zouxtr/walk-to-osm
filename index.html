<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#4CAF50">
  <meta name="description" content="Log locations on walks and contribute to OpenStreetMap">
  <title>Walk Logger</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header id="header">
      <h1>Walk Logger</h1>
      <div class="header-actions">
        <button id="locations-btn" aria-label="Saved locations">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
            <circle cx="12" cy="10" r="3"></circle>
          </svg>
        </button>
        <button id="theme-btn" aria-label="Toggle dark mode">
          <svg class="icon-sun" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
          </svg>
          <svg class="icon-moon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
        </button>
        <button id="settings-btn" aria-label="Settings">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
          </svg>
        </button>
      </div>
    </header>

    <!-- Settings Panel (expandable) -->
    <div id="settings-panel" class="hidden">
      <div class="settings-content">
        <div class="settings-header">
          <h2>Settings</h2>
          <button id="settings-close" aria-label="Close settings">&times;</button>
        </div>
        <div class="settings-body">
          <label class="settings-label">Logging Mode</label>
          <div class="radio-group">
            <label class="radio-option">
              <input type="radio" name="loggingMode" value="quick" checked>
              <span class="radio-label">Quick log</span>
              <span class="radio-desc">Tap &rarr; saves coordinates instantly. No prompts.</span>
            </label>
            <label class="radio-option">
              <input type="radio" name="loggingMode" value="withName">
              <span class="radio-label">Log with name</span>
              <span class="radio-desc">Tap &rarr; saves instantly, then shows inline name input.</span>
            </label>
          </div>

          <label class="settings-label">OpenStreetMap Contribution</label>
          <p class="settings-desc">No setup needed! Just log in to <a href="https://www.openstreetmap.org" target="_blank" rel="noopener">openstreetmap.org</a> in your browser before contributing.</p>
        </div>
      </div>
    </div>

    <!-- Main Content Views -->
    <main id="main">
      <!-- Screen 1: Map + Log Button -->
      <section id="view-map" class="view active">
        <div id="map"></div>
        <div id="map-controls">
          <button id="log-btn" class="log-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 5v14M5 12h14"></path>
            </svg>
            Log Location
          </button>
          <button id="locate-btn" class="locate-btn" aria-label="Center on my location">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="3"></circle>
              <path d="M12 2v4M12 18v4M2 12h4M18 12h4"></path>
            </svg>
          </button>
        </div>
      </section>

      <!-- Screen 2: Location List -->
      <section id="view-list" class="view hidden">
        <div class="view-header">
          <button class="back-btn" data-view="map" aria-label="Back to map">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M19 12H5M12 19l-7-7 7-7"></path>
            </svg>
          </button>
          <h2>Saved Locations</h2>
        </div>
        <div id="location-list" class="location-list"></div>
        <div class="list-actions">
          <button id="clear-btn" class="danger-btn">Clear All</button>
        </div>
      </section>

      <!-- Screen 3: Edit Location -->
      <section id="view-edit" class="view hidden">
        <div class="view-header">
          <button class="back-btn" data-view="list" aria-label="Back to list">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M19 12H5M12 19l-7-7 7-7"></path>
            </svg>
          </button>
          <h2>Edit Location</h2>
        </div>
        <div id="edit-map" class="edit-map"></div>
        <div class="edit-fields">
          <div class="form-row">
            <label>Name</label>
            <input type="text" id="edit-name" placeholder="Place name">
          </div>
          <div class="form-row row-half">
            <div>
              <label>Latitude</label>
              <input type="text" id="edit-lat">
            </div>
            <div>
              <label>Longitude</label>
              <input type="text" id="edit-lng">
            </div>
          </div>
          <p class="edit-hint">Drag the pin on the map or edit fields above</p>
        </div>
        <div class="edit-actions">
          <button id="edit-save-btn" class="primary-btn">Save Changes</button>
          <button id="edit-delete-btn" class="danger-btn">Delete</button>
        </div>
      </section>
    </main>

    <!-- Toast notifications -->
    <div id="toast" class="toast hidden"></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="overpass.js"></script>
  <script src="osm.js"></script>
  <script src="app.js"></script>
</body>
</html>
